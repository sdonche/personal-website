<head>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23020617'/%3E%3Cpath d='M9 11 L14 16 L9 21' fill='none' stroke='%2322d3ee' stroke-width='2.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3Crect x='16' y='18.7' width='7.5' height='2.6' rx='1.3' fill='%2322d3ee'/%3E%3C/svg%3E" />
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/img/favicon-32.png" />

</head>

<body class="bg-slate-950 text-slate-100 font-sans antialiased">

  <div aria-hidden="true" class="fixed inset-0 -z-10 bg-slate-950">
    <div class="absolute inset-0 grid-bg opacity-[0.35]"></div>
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_rgba(34,211,238,0.08),_transparent_60%)]"></div>
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_bottom_right,_rgba(52,211,153,0.05),_transparent_50%)]"></div>
  </div>

  <!-- Top bar -->
  <header class="fixed top-0 inset-x-0 z-40 backdrop-blur-md bg-slate-950/60 border-b border-slate-800/60">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
      <a href="../" class="flex items-center gap-2 group" aria-label="Home">
        <span class="relative inline-flex h-2.5 w-2.5">
          <span class="absolute inset-0 rounded-full bg-accent animate-ping opacity-60"></span>
          <span class="relative rounded-full h-2.5 w-2.5 bg-accent"></span>
        </span>
        <span class="font-mono text-xs sm:text-sm tracking-wider text-slate-300 group-hover:text-brand-300 transition-colors">
          sam.donche<span class="text-brand-400">@</span>edge
        </span>
      </a>
      <a href="../" class="font-mono text-[11px] uppercase tracking-widest text-slate-500 hover:text-brand-300 transition-colors">← back</a>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 sm:px-6 pt-28 pb-24">

    <p class="section-eyebrow">// Operator Log</p>
    <h1 class="section-title">Discovery record.</h1>
    <p class="mt-5 text-slate-400 leading-relaxed max-w-xl">
      A running log of the secrets built into this site. Redacted entries stay
      hidden until you trip them; hints only. Progress is kept on this device.
    </p>

    <!-- Capstone: revealed at 9/9 -->
    <div id="capstone" class="oplog-capstone" hidden></div>

    <!-- Rank + progress -->
    <div class="oplog-meta">
      <div class="oplog-rank">
        <span class="oplog-rank__label">Operator rank</span>
        <span class="oplog-rank__value" id="rank">Visitor</span>
      </div>
      <div class="oplog-progress">
        <div class="oplog-progress__head">
          <span>systems discovered</span>
          <span id="count" class="oplog-progress__count">0 / 0</span>
        </div>
        <div class="oplog-progress__bar" id="bar"><span></span></div>
      </div>
    </div>

    <!-- Egg list -->
    <ol class="oplog-list" id="list"></ol>

    <div class="oplog-foot">
      <button type="button" id="reset" class="oplog-reset">reset log</button>
    </div>
  </main>

  <script src="../assets/js/eggs.js?v=184404dc3e"></script>
  <script>
    (function () {
      var E = window.EGGS;
      if (!E) return;
      E.unlock("log");                       // reaching this page counts as finding it
      function render() {
        var found = E.discovered();
        var total = E.REGISTRY.length;
        var n = found.size;
        document.getElementById("rank").textContent = E.rankFor(n);
        document.getElementById("count").textContent = n + " / " + total;
        document.getElementById("bar").style.setProperty("--pct", Math.round((n / total) * 100) + "%");

        var cap = document.getElementById("capstone");
        if (n >= total) {
          cap.hidden = false;
          cap.innerHTML =
            '<div class="oplog-capstone__seal" aria-hidden="true">◆</div>' +
            '<div class="oplog-capstone__body">' +
              '<p class="oplog-capstone__kicker">◆ all systems discovered · certified</p>' +
              '<h2 class="oplog-capstone__title">Plant Architect</h2>' +
              '<p class="oplog-capstone__note">You went looking, and you found every last one. That’s exactly the instinct I want in the people I build with: curious enough to poke at the edges, stubborn enough to reach the bottom of it. If you’re wiring up a factory floor and want a hand, let’s talk.</p>' +
              '<p class="oplog-capstone__sign">Sam</p>' +
              '<a class="oplog-capstone__cta" href="../#contact">Get in touch &rarr;</a>' +
            '</div>';
        } else {
          cap.hidden = true;
          cap.innerHTML = "";
        }

        document.getElementById("list").innerHTML = E.REGISTRY.map(function (e) {
          var got = found.has(e.id);
          return '<li class="oplog-item ' + (got ? "is-found" : "is-locked") + '">' +
            '<span class="oplog-item__mark">' + (got ? "✓" : "▢") + '</span>' +
            '<div class="oplog-item__body">' +
              '<p class="oplog-item__name">' + (got ? e.name : "██ redacted ██") + '</p>' +
              '<p class="oplog-item__how">' + (got ? e.how : e.hint) + '</p>' +
            '</div></li>';
        }).join("");
      }
      render();
      document.getElementById("reset").addEventListener("click", function () {
        E.reset();
        render();
      });
    })();
  </script>
</body>
</html>
